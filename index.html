<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Notes App</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <main>
        <div id="sideBar">
            <h1>Frogman Notes</h1>
            <br>
            <button id="addNoteButton">New Note</button>
            <br>
            <input type="text" id="searchNotes" placeholder="Search Your notes">
            <div id="showNotesList">Notes title will appear here</div>
        </div>
        <div id="textareaContainer">
            <textarea name="Textarea" id="WritingTextArea"></textarea>
        </div>
        <div id="showTextArea"></div>
    </main>
    <script src="script.js"></script>
</body>

</html>
